<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>BLE Player</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#0a0a0f; --bg2:#12121a; --bg3:#1a1a26; --border:#2a2a3d;
      --accent:#7c6aff; --accent2:#ff6ab0; --text:#e8e8f0; --text-dim:#6a6a8a;
      --success:#4fffb0; --warning:#ffb74d; --sidebar-w:260px;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Syne',sans-serif; background:var(--bg); color:var(--text); height:100dvh; overflow:hidden; display:flex; flex-direction:column; }

    /* ── トップバー ── */
    #topbar { height:48px; background:var(--bg2); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 16px; gap:16px; flex-shrink:0; z-index:100; }
    #topbar .logo { font-size:13px; font-weight:800; letter-spacing:.2em; color:var(--accent); text-transform:uppercase; }
    #topbar .ble-status { margin-left:auto; display:flex; align-items:center; gap:8px; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-dim); }
    .dot { width:8px; height:8px; border-radius:50%; background:var(--success); box-shadow:0 0 8px var(--success); animation:pulse 2s infinite; }
    .dot.disconnected { background:var(--text-dim); box-shadow:none; animation:none; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ── レイアウト ── */
    #app { display:flex; flex:1; overflow:hidden; }

    /* ── サイドバー ── */
    #sidebar { width:var(--sidebar-w); background:var(--bg2); border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; overflow:hidden; }
    .sidebar-top { padding:10px 12px; border-bottom:1px solid var(--border); display:flex; flex-direction:column; gap:8px; }
    .search-input { width:100%; background:var(--bg3); border:1px solid var(--border); border-radius:6px; padding:7px 10px; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text); outline:none; }
    .search-input::placeholder { color:var(--text-dim); }
    .search-input:focus { border-color:var(--accent); }
    .sort-row { display:flex; gap:6px; align-items:center; }
    .sort-label { font-size:9px; color:var(--text-dim); font-family:'JetBrains Mono',monospace; flex-shrink:0; }
    .sort-select { flex:1; background:var(--bg3); border:1px solid var(--border); border-radius:4px; padding:4px 6px; font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--text); outline:none; cursor:pointer; }
    .library-list { flex:1; overflow-y:auto; padding:4px 0; }
    .library-list::-webkit-scrollbar { width:4px; }
    .library-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
    .work-item { padding:10px 14px; cursor:pointer; border-left:3px solid transparent; transition:all .15s; }
    .work-item:hover { background:var(--bg3); }
    .work-item.active { border-left-color:var(--accent); background:rgba(124,106,255,.08); }
    .work-item-header { display:flex; align-items:flex-start; gap:6px; }
    .work-title { font-size:12px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; }
    .fav-btn { background:none; border:none; cursor:pointer; font-size:12px; color:var(--text-dim); flex-shrink:0; padding:0; transition:color .15s; }
    .fav-btn.active { color:var(--warning); }
    .work-meta { font-size:10px; font-family:'JetBrains Mono',monospace; color:var(--text-dim); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .work-rj { font-size:9px; color:var(--accent); margin-top:2px; font-family:'JetBrains Mono',monospace; }
    .work-plays { font-size:9px; color:var(--text-dim); font-family:'JetBrains Mono',monospace; }
    .file-op-btn { background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:11px; padding:2px 4px; border-radius:3px; transition:all .15s; flex-shrink:0; }
    .file-op-btn:hover { color:var(--accent); background:rgba(124,106,255,.1); }

    /* 右クリックメニュー */
    #ctx-menu { position:fixed; background:var(--bg2); border:1px solid var(--border); border-radius:8px; padding:4px 0; z-index:9999; min-width:160px; box-shadow:0 8px 24px rgba(0,0,0,.4); display:none; }
    #ctx-menu.show { display:block; }
    .ctx-item { padding:8px 16px; font-size:12px; cursor:pointer; transition:background .1s; white-space:nowrap; }
    .ctx-item:hover { background:var(--bg3); color:var(--accent); }
    .ctx-separator { height:1px; background:var(--border); margin:4px 0; }
    .sidebar-bottom { padding:10px 12px; border-top:1px solid var(--border); display:flex; flex-direction:column; gap:6px; }
    .btn-outline { width:100%; padding:8px; background:transparent; border:1px dashed var(--border); border-radius:6px; color:var(--text-dim); font-family:'Syne',sans-serif; font-size:11px; cursor:pointer; transition:all .15s; letter-spacing:.05em; }
    .btn-outline:hover { border-color:var(--accent); color:var(--accent); }
    .btn-outline.secondary { border-style:solid; font-size:10px; padding:6px; }

    /* ── メインエリア ── */
    #main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
    #tracklist { padding:16px 20px 12px; border-bottom:1px solid var(--border); background:var(--bg2); }
    .work-header { display:flex; align-items:baseline; gap:8px; margin-bottom:10px; flex-wrap:wrap; }
    .work-header h2 { font-size:16px; font-weight:700; }
    .work-header .rj { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--accent); }
    .work-header .circle { font-size:11px; color:var(--text-dim); margin-left:auto; }
    .edit-btn { font-size:10px; font-family:'JetBrains Mono',monospace; background:transparent; border:1px solid var(--border); border-radius:4px; color:var(--text-dim); padding:2px 8px; cursor:pointer; transition:all .15s; }
    .edit-btn:hover { border-color:var(--accent); color:var(--accent); }
    .tracks { display:flex; gap:8px; overflow-x:auto; padding-bottom:8px; }
    .tracks::-webkit-scrollbar { height:8px; }
    .tracks::-webkit-scrollbar-track { background:var(--bg3); border-radius:4px; }
    .tracks::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
    .tracks::-webkit-scrollbar-thumb:hover { background:var(--accent); }
    .track { flex-shrink:0; padding:7px 12px; border-radius:6px; border:1px solid var(--border); font-size:11px; cursor:pointer; transition:all .15s; display:flex; align-items:center; gap:8px; background:var(--bg3); }
    .track:hover { border-color:var(--accent); }
    .track.active { border-color:var(--accent); background:rgba(124,106,255,.15); color:var(--accent); }
    .csv-badge { font-size:9px; font-family:'JetBrains Mono',monospace; padding:1px 5px; border-radius:3px; background:rgba(79,255,176,.15); color:var(--success); }
    .csv-badge.missing { background:rgba(255,183,77,.1); color:var(--warning); }

    /* ── プレイヤー ── */
    #player-area { flex:1; display:flex; flex-direction:column; overflow:hidden; position:relative; }
    #video-wrap { flex:1; background:#000; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; }
    #video-wrap video { max-width:100%; max-height:100%; }
    .no-media { display:flex; flex-direction:column; align-items:center; gap:12px; color:var(--text-dim); }
    .no-media .icon { font-size:48px; opacity:.3; }
    .no-media p { font-size:12px; font-family:'JetBrains Mono',monospace; letter-spacing:.1em; }
    .fullscreen-btn { position:absolute; top:12px; right:12px; background:rgba(0,0,0,.5); border:1px solid var(--border); border-radius:6px; color:var(--text-dim); padding:6px 10px; font-size:11px; cursor:pointer; font-family:'JetBrains Mono',monospace; transition:all .15s; }
    .fullscreen-hint { position:absolute; bottom:16px; left:50%; transform:translateX(-50%); font-family:'JetBrains Mono',monospace; font-size:10px; color:rgba(255,255,255,.3); letter-spacing:.1em; pointer-events:none; opacity:0; transition:opacity .3s; }
    body.fullscreen .fullscreen-btn { display:none; }

    /* ── コントロール ── */
    #controls { background:var(--bg2); border-top:1px solid var(--border); padding:10px 20px 12px; flex-shrink:0; }
    .time-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
    .time-display { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-dim); flex-shrink:0; }
    .seekbar { flex:1; height:4px; background:var(--bg3); border-radius:2px; position:relative; cursor:pointer; }
    .seekbar-fill { height:100%; width:0%; background:var(--accent); border-radius:2px; position:relative; }
    .seekbar-fill::after { content:''; position:absolute; right:-5px; top:-4px; width:12px; height:12px; background:var(--accent); border-radius:50%; box-shadow:0 0 8px var(--accent); }
    .btn-row { display:flex; align-items:center; gap:12px; }
    .play-btn { width:36px; height:36px; border-radius:50%; background:var(--accent); border:none; color:#fff; font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .15s; flex-shrink:0; }
    .play-btn:hover { background:#9d8fff; box-shadow:0 0 16px rgba(124,106,255,.5); }
    .icon-btn { background:transparent; border:none; color:var(--text-dim); font-size:14px; cursor:pointer; padding:6px; border-radius:4px; transition:all .15s; }
    .icon-btn:hover { color:var(--text); background:var(--bg3); }
    .manual-slider-wrap { margin-left:auto; display:flex; align-items:center; gap:10px; }
    .manual-slider-label { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--text-dim); flex-shrink:0; }
    .manual-slider { -webkit-appearance:none; width:120px; height:4px; border-radius:2px; background:var(--bg3); outline:none; cursor:pointer; }
    .manual-slider::-webkit-slider-thumb { -webkit-appearance:none; width:14px; height:14px; border-radius:50%; background:var(--accent2); box-shadow:0 0 8px var(--accent2); cursor:pointer; }
    .manual-value { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--accent2); width:36px; text-align:right; }

    /* ── タイムライン ── */
    #timeline { height:72px; background:var(--bg2); border-top:1px solid var(--border); flex-shrink:0; position:relative; overflow:hidden; }
    .tl-label { position:absolute; top:6px; left:12px; font-size:9px; letter-spacing:.12em; text-transform:uppercase; color:var(--text-dim); font-family:'JetBrains Mono',monospace; }
    .tl-track { position:absolute; top:26px; left:12px; right:12px; height:24px; background:var(--bg3); border-radius:4px; border:1px solid var(--border); overflow:visible; }
    .tl-playhead { position:absolute; top:-6px; bottom:-6px; width:2px; background:var(--accent); left:0%; box-shadow:0 0 8px var(--accent); }
    .tl-playhead::before { content:''; position:absolute; top:-1px; left:-4px; width:10px; height:10px; background:var(--accent); clip-path:polygon(50% 0%,0% 40%,100% 40%); }
    .tl-marker { position:absolute; bottom:3px; width:2px; border-radius:1px; transform:translateX(-50%); cursor:pointer; transition:opacity .15s; }
    .tl-marker:hover { opacity:.7; }
    .tl-marker.dir0 { background:var(--accent); }
    .tl-marker.dir1 { background:var(--accent2); }
    .tl-time-marks { position:absolute; bottom:4px; left:12px; right:12px; display:flex; justify-content:space-between; }
    .tl-time-mark { font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--text-dim); }
    .mode-badge { position:absolute; top:6px; right:12px; font-size:9px; font-family:'JetBrains Mono',monospace; padding:2px 7px; border-radius:3px; border:1px solid var(--border); color:var(--text-dim); cursor:pointer; transition:all .15s; }
    .mode-badge:hover { border-color:var(--accent); color:var(--accent); }
    .mode-badge.active { border-color:var(--success); color:var(--success); background:rgba(79,255,176,.08); }

    /* ── 全画面 ── */
    body.fullscreen #sidebar, body.fullscreen #topbar, body.fullscreen #tracklist { display:none; }
    body.fullscreen #main { background:#000; }
    body.fullscreen #video-wrap { position:fixed; inset:0; z-index:401; }
    body.fullscreen #controls { position:fixed; bottom:0; left:0; right:0; z-index:402; opacity:0; transition:opacity .3s; pointer-events:none; background:rgba(10,10,15,.9); }
    body.fullscreen #timeline  { position:fixed; bottom:86px; left:0; right:0; z-index:402; opacity:0; transition:opacity .3s; pointer-events:none; background:rgba(10,10,15,.9); }
    body.fullscreen.show-controls #controls,
    body.fullscreen.show-controls #timeline { opacity:1; pointer-events:auto; }
    .exit-fullscreen-btn { display:none; position:absolute; top:12px; left:12px; z-index:410; background:rgba(0,0,0,.6); border:1px solid var(--border); border-radius:6px; color:var(--text); padding:8px 14px; font-size:13px; cursor:pointer; font-family:'JetBrains Mono',monospace; }
    body.fullscreen.show-controls .exit-fullscreen-btn { display:block; }
    body.fullscreen .fullscreen-btn { display:none; }
    /* スマホ全画面：回転＋タイムライン非表示 */
    @media (max-width:768px) {
      body.fullscreen #player-area { position:fixed; inset:0; z-index:400; background:#000; display:flex; flex-direction:column; width:100dvh; height:100dvw; top:50%; left:50%; transform:translate(-50%,-50%) rotate(90deg); }
      body.fullscreen #timeline { display:none; }
      body.fullscreen #controls { bottom:0; }
    }

    /* ── BLE接続画面 ── */
    #connect-screen { position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:999; }
    #connect-screen .connect-logo { font-size:11px; font-weight:800; letter-spacing:.3em; color:var(--accent); text-transform:uppercase; margin-bottom:48px; }
    #connect-screen .connect-ring { width:120px; height:120px; border-radius:50%; border:2px solid var(--border); display:flex; align-items:center; justify-content:center; position:relative; margin-bottom:32px; }
    #connect-screen .connect-ring::before { content:''; position:absolute; inset:-8px; border-radius:50%; border:1px solid transparent; border-top-color:var(--accent); animation:spin 1.5s linear infinite; opacity:0; }
    #connect-screen.connecting .connect-ring::before { opacity:1; }
    @keyframes spin { to{transform:rotate(360deg)} }
    #connect-screen .connect-icon { font-size:40px; opacity:.4; }
    #connect-screen h1 { font-size:20px; font-weight:700; margin-bottom:8px; }
    #connect-screen .connect-sub { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-dim); margin-bottom:40px; letter-spacing:.08em; }
    #connect-screen .connect-btn { padding:12px 32px; background:var(--accent); border:none; border-radius:8px; color:#fff; font-family:'Syne',sans-serif; font-size:13px; font-weight:700; cursor:pointer; transition:all .2s; }
    #connect-screen .connect-btn:hover { background:#9d8fff; box-shadow:0 0 24px rgba(124,106,255,.4); }
    #connect-screen .connect-btn:disabled { opacity:.5; cursor:not-allowed; }
    #connect-screen .connect-error { margin-top:16px; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--accent2); min-height:16px; text-align:center; }
    #connect-screen .skip-btn { margin-top:24px; background:transparent; border:none; color:var(--text-dim); font-family:'JetBrains Mono',monospace; font-size:10px; cursor:pointer; text-decoration:underline; }
    #connect-screen.hidden { display:none; }

    /* ── モーダル共通 ── */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:800; display:flex; align-items:center; justify-content:center; padding:20px; }
    .modal-overlay.hidden { display:none; }
    .modal-box { background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:24px; width:100%; max-width:440px; max-height:80dvh; overflow-y:auto; }
    .modal-box h2 { font-size:15px; font-weight:700; margin-bottom:4px; }
    .modal-subtitle { font-size:11px; font-family:'JetBrains Mono',monospace; color:var(--text-dim); margin-bottom:8px; }
    .modal-progress { font-size:10px; font-family:'JetBrains Mono',monospace; color:var(--accent); margin-bottom:16px; }
    .modal-field { margin-bottom:14px; }
    .modal-field label { display:block; font-size:10px; font-family:'JetBrains Mono',monospace; color:var(--text-dim); margin-bottom:5px; letter-spacing:.08em; text-transform:uppercase; }
    .modal-input { width:100%; background:var(--bg3); border:1px solid var(--border); border-radius:6px; padding:8px 10px; font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--text); outline:none; }
    .modal-input:focus { border-color:var(--accent); }
    .modal-input::placeholder { color:var(--text-dim); }
    .modal-btns { display:flex; gap:10px; margin-top:20px; }
    .modal-btn { flex:1; padding:10px; border-radius:6px; font-family:'Syne',sans-serif; font-size:12px; font-weight:600; cursor:pointer; transition:all .15s; border:none; }
    .modal-btn.primary { background:var(--accent); color:#fff; }
    .modal-btn.primary:hover { background:#9d8fff; }
    .modal-btn.cancel { background:var(--bg3); color:var(--text-dim); }
    .csv-select-btn { width:100%; padding:12px; background:var(--bg3); border:1px solid var(--border); border-radius:8px; color:var(--text); font-family:'Syne',sans-serif; font-size:12px; font-weight:600; cursor:pointer; transition:all .15s; margin-bottom:8px; text-align:left; }
    .csv-select-btn:hover { border-color:var(--accent); color:var(--accent); }

    /* ── ドロップゾーン ── */
    #drop-zone { display:none; position:fixed; inset:0; background:rgba(124,106,255,.15); border:2px dashed var(--accent); z-index:500; align-items:center; justify-content:center; font-size:14px; letter-spacing:.1em; color:var(--accent); pointer-events:none; }
    #drop-zone.active { display:flex; }

    /* ── ハンバーガー ── */
    #hamburger { display:none; background:transparent; border:none; color:var(--text); font-size:20px; cursor:pointer; padding:4px 8px; line-height:1; }
    #sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:200; }
    #sidebar-overlay.open { display:block; }

    /* ── Safe Area ── */
    @supports (padding-bottom:env(safe-area-inset-bottom)) {
      #timeline { padding-bottom:calc(4px + env(safe-area-inset-bottom)); }
      #controls  { padding-bottom:calc(10px + env(safe-area-inset-bottom)); }
    }

    /* ── スマホ ── */
    @media (max-width:768px) {
      #hamburger { display:block; }
      #sidebar { position:fixed; top:0; left:0; bottom:0; z-index:300; width:280px; transform:translateX(-100%); transition:transform .25s ease; }
      #sidebar.open { transform:translateX(0); }
      #app { flex-direction:column; }
      #main { width:100%; }
      #tracklist { padding:10px 12px 8px; }
      .work-header h2 { font-size:13px; }
      .track { padding:10px 14px; font-size:12px; }
      #video-wrap { min-height:200px; }
      #controls { padding:8px 12px 10px; }
      .play-btn { width:44px; height:44px; font-size:18px; }
      .icon-btn { font-size:18px; padding:8px; }
      .btn-row { flex-wrap:wrap; gap:8px; }
      .manual-slider-wrap { margin-left:0; width:100%; justify-content:flex-start; padding-top:4px; border-top:1px solid var(--border); }
      .manual-slider { width:calc(100% - 80px); }
      #timeline { height:80px; }
    }
  </style>
</head>
<body>

  <!-- BLE接続画面 -->
  <div id="connect-screen">
    <div class="connect-logo">BLE Player</div>
    <div class="connect-ring"><div class="connect-icon">◎</div></div>
    <h1>デバイスに接続</h1>
    <p class="connect-sub">UFO SA との Bluetooth 接続を開始します</p>
    <button class="connect-btn" id="connectBtn" onclick="startConnect()">UFO SA に接続する</button>
    <div class="connect-error" id="connectError"></div>
    <button class="skip-btn" onclick="skipConnect()">接続せずに続ける（テスト用）</button>
  </div>

  <!-- メタデータモーダル -->
  <div id="meta-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <h2 id="modal-title">作品情報を入力</h2>
      <p class="modal-subtitle" id="modal-folder"></p>
      <div class="modal-progress" id="modal-progress"></div>
      <div class="modal-field"><label>作品名</label><input class="modal-input" type="text" id="meta-work" placeholder="作品名"></div>
      <div class="modal-field"><label>サークル名</label><input class="modal-input" type="text" id="meta-circle" placeholder="サークル名"></div>
      <div class="modal-field"><label>声優名（複数はカンマ区切り）</label><input class="modal-input" type="text" id="meta-cv" placeholder="例：田中あい, 鈴木みく"></div>
      <div class="modal-field"><label>RJ番号（任意）</label><input class="modal-input" type="text" id="meta-rj" placeholder="例：RJ012345"></div>
      <div class="modal-btns">
        <button class="modal-btn cancel" onclick="skipMeta()">スキップ</button>
        <button class="modal-btn primary" onclick="saveMeta()">保存</button>
      </div>
    </div>
  </div>

  <!-- CSV選択モーダル -->
  <div id="csv-select-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <h2>CSV編集</h2>
      <p class="modal-subtitle" id="csv-select-track"></p>
      <div style="margin-top:16px;">
        <button class="csv-select-btn" id="csvBtnExisting" onclick="goToEditor('existing')">📄 既存CSVを編集</button>
        <button class="csv-select-btn" onclick="goToEditor('new')">✨ 新規作成</button>
        <button class="csv-select-btn" id="csvBtnCopy" onclick="goToEditor('copy')">📋 コピーして編集</button>
      </div>
      <div class="modal-btns">
        <button class="modal-btn cancel" onclick="document.getElementById('csv-select-modal').classList.add('hidden')">キャンセル</button>
      </div>
    </div>
  </div>

  <!-- 右クリックメニュー -->
  <div id="ctx-menu"></div>

  <!-- ドロップゾーン -->
  <div id="drop-zone">フォルダをドロップ</div>

  <!-- サイドバーオーバーレイ -->
  <div id="sidebar-overlay" onclick="closeSidebar()"></div>

  <!-- トップバー -->
  <div id="topbar">
    <button id="hamburger" onclick="openSidebar()">☰</button>
    <span class="logo">BLE Player</span>
    <div class="ble-status">
      <div class="dot disconnected" id="bleDot"></div>
      <span id="bleLabel">未接続</span>
    </div>
  </div>

  <div id="app">
    <!-- サイドバー -->
    <div id="sidebar">
      <div class="sidebar-top">
        <input type="text" class="search-input" id="searchInput" placeholder="作品名・サークル・声優・RJで検索…" oninput="renderLibrarySidebar()">
        <div class="sort-row">
          <span class="sort-label">並び替え</span>
          <select class="sort-select" id="sortSelect" onchange="renderLibrarySidebar()">
            <option value="added">追加順</option>
            <option value="title">作品名</option>
            <option value="circle">サークル名</option>
            <option value="plays">再生回数</option>
            <option value="fav">お気に入り</option>
          </select>
        </div>
      </div>
      <div class="library-list" id="libraryList"></div>
      <div class="sidebar-bottom">
        <button class="btn-outline" id="addFolderBtn">＋ フォルダを追加</button>
        <button class="btn-outline secondary" onclick="exportLibrary()">ライブラリを書き出し</button>
        <button class="btn-outline secondary" onclick="document.getElementById('importInput').click()">ライブラリを読み込み</button>
        <input type="file" id="importInput" accept=".json" style="display:none" onchange="importLibrary(event)">
      </div>
    </div>

    <!-- メインエリア -->
    <div id="main">
      <div id="tracklist">
        <div class="work-header">
          <h2 id="work-title-display">作品を選択してください</h2>
          <span class="rj" id="work-rj-display"></span>
          <span class="circle" id="work-circle-display"></span>
          <button class="edit-btn" id="editMetaBtn" style="display:none" onclick="openEditMeta()">情報編集</button>
          <button class="edit-btn" id="editCsvBtn"  style="display:none" onclick="openCsvSelect()">CSV編集</button>
        </div>
        <div class="tracks" id="tracksEl"></div>
      </div>

      <div id="player-area">
        <div id="video-wrap">
          <div class="no-media"><div class="icon">▶</div><p>フォルダを追加してください</p></div>
          <video id="media-player" style="display:none; max-width:100%; max-height:100%;"></video>
          <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ 全画面</button>
          <button class="exit-fullscreen-btn" onclick="leaveFullscreen()">✕ 終了</button>
        </div>

        <div id="controls">
          <div class="time-row">
            <span class="time-display" id="timecur">00:00</span>
            <div class="seekbar" id="seekbar"><div class="seekbar-fill" id="seekbarFill"></div></div>
            <span class="time-display" id="timedur">00:00</span>
          </div>
          <div class="btn-row">
            <button class="icon-btn" id="btnPrev">⏮</button>
            <button class="play-btn" id="playBtn">▶</button>
            <button class="icon-btn" id="btnNext">⏭</button>
            <button class="icon-btn" id="btnLoop">↻</button>
            <div class="manual-slider-wrap">
              <span class="manual-slider-label">音量</span>
              <input type="range" class="manual-slider" id="volumeSlider" min="0" max="100" value="100"
                oninput="player.volume=this.value/100; document.getElementById('volumeLabel').textContent=this.value+'%'">
              <span class="manual-value" id="volumeLabel">100%</span>
            </div>
            <div class="manual-slider-wrap">
              <span class="manual-slider-label">速度倍率</span>
              <input type="range" class="manual-slider" id="speedRateSlider" min="0" max="100" value="50"
                oninput="speedRateValue=this.value/100; document.getElementById('speedRateLabel').textContent=this.value+'%'">
              <span class="manual-value" id="speedRateLabel">50%</span>
            </div>
          </div>
        </div>

        <div id="timeline">
          <span class="tl-label">タイムライン</span>
          <span class="mode-badge active" id="modeBtn" onclick="toggleMode()">CSV モード</span>
          <div class="tl-track" id="tlTrack"><div class="tl-playhead" id="tlPlayhead"></div></div>
          <div class="tl-time-marks">
            <span class="tl-time-mark">0:00</span>
            <span class="tl-time-mark">-</span>
            <span class="tl-time-mark">-</span>
            <span class="tl-time-mark">-</span>
            <span class="tl-time-mark">-</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ══════════════════════════════
    //  BLE
    // ══════════════════════════════
    const UFO_SERVICE = '40ee1111-63ec-4b7f-8ce7-712efd55b90e';
    const UFO_CHAR    = '40ee2222-63ec-4b7f-8ce7-712efd55b90e';
    const UFO_ID      = 0x02;
    let bleDevice = null, bleChar = null, speedRateValue = 0.5;

    async function sendCommand(direction, strength) {
      if (!bleChar) return;
      const spd   = Math.min(100, Math.floor(strength * speedRateValue));
      const byte2 = (direction === 1 ? 0x80 : 0x00) | (spd & 0x7f);
      try { await bleChar.writeValue(new Uint8Array([UFO_ID, 0x01, byte2])); }
      catch(e) { console.warn('BLE送信エラー:', e); }
    }

    async function startConnect() {
      const btn = document.getElementById('connectBtn');
      const err = document.getElementById('connectError');
      const scr = document.getElementById('connect-screen');
      btn.disabled = true; btn.textContent = '接続中…'; err.textContent = '';
      scr.classList.add('connecting');
      try {
        bleDevice = await navigator.bluetooth.requestDevice({ filters:[{name:'UFOSA'}], optionalServices:[UFO_SERVICE] });
        const server  = await bleDevice.gatt.connect();
        const service = await server.getPrimaryService(UFO_SERVICE);
        bleChar = await service.getCharacteristic(UFO_CHAR);
        bleDevice.addEventListener('gattserverdisconnected', onDisconnected);
        enterMain(bleDevice.name || 'UFO SA');
      } catch(e) {
        scr.classList.remove('connecting');
        btn.disabled = false; btn.textContent = 'UFO SA に接続する';
        if (e.name !== 'NotFoundError') err.textContent = 'エラー: ' + e.message;
      }
    }

    function skipConnect() { enterMain(null); }

    function enterMain(deviceName) {
      document.getElementById('connect-screen').classList.add('hidden');
      if (deviceName) {
        document.getElementById('bleLabel').textContent = deviceName + ' 接続済';
        document.getElementById('bleDot').classList.remove('disconnected');
      } else {
        document.getElementById('bleLabel').textContent = '未接続（テスト）';
      }
      document.getElementById('addFolderBtn').click();
    }

    function onDisconnected() {
      bleChar = null;
      document.getElementById('bleDot').classList.add('disconnected');
      document.getElementById('bleLabel').textContent = '切断されました';
      if (confirm('UFO SA との接続が切れました。再接続しますか？')) {
        const scr = document.getElementById('connect-screen');
        scr.classList.remove('hidden','connecting');
        document.getElementById('connectBtn').disabled = false;
        document.getElementById('connectBtn').textContent = 'UFO SA に接続する';
        document.getElementById('connectError').textContent = '';
      }
    }

    // ══════════════════════════════
    //  ライブラリ
    // ══════════════════════════════
    let library = {};

    function loadLibraryFromStorage() {
      try { library = JSON.parse(localStorage.getItem('ble-library') || '{}'); }
      catch { library = {}; }
    }

    function saveLibraryToStorage() { localStorage.setItem('ble-library', JSON.stringify(library)); }

    function exportLibrary() {
      const blob = new Blob([JSON.stringify(library,null,2)], {type:'application/json'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob); a.download = 'ble-library.json'; a.click();
    }

    function importLibrary(event) {
      const file = event.target.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        try { library = JSON.parse(e.target.result); saveLibraryToStorage(); renderLibrarySidebar(); alert('ライブラリを読み込みました'); }
        catch { alert('ファイルの形式が正しくありません'); }
      };
      reader.readAsText(file); event.target.value = '';
    }

    // ══════════════════════════════
    //  ファイル管理
    // ══════════════════════════════
    let mediaFiles = {}, csvFiles = {};
    let pendingFolders = [], currentMetaIndex = 0, editingWorkId = null;

    // File System Access API対応判定
    const supportsFileSystemAccess = 'showDirectoryPicker' in window;

    // ルートフォルダハンドル（File System Access API用）
    let rootDirHandle = null;
    // フォルダハンドルのキャッシュ { folderName: FileSystemDirectoryHandle }
    const dirHandles = {};
    // CSVファイルハンドルのキャッシュ { base: FileSystemFileHandle }
    const csvHandles = {};

    const dropZone = document.getElementById('drop-zone');
    document.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('active'); });
    document.addEventListener('dragleave', (e) => { if (!e.relatedTarget) dropZone.classList.remove('active'); });
    document.addEventListener('drop', async (e) => {
      e.preventDefault(); dropZone.classList.remove('active');
      for (const item of [...e.dataTransfer.items]) {
        const entry = item.webkitGetAsEntry();
        if (entry && entry.isDirectory) await processFolderEntry(entry, entry.name);
      }
      // D&Dはwebkit Entry API（supportsFileSystemAccessと無関係）なのでここでモーダル起動
      if (pendingFolders.length > 0 && currentMetaIndex === 0) {
        currentMetaIndex = 0; showMetaModal();
      }
    });

    document.getElementById('addFolderBtn').addEventListener('click', async () => {
      if (supportsFileSystemAccess) {
        // PC: File System Access API
        try {
          const dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
          rootDirHandle = dirHandle;
          await scanDirHandle(dirHandle, dirHandle.name, null);
        } catch (e) {
          if (e.name !== 'AbortError') console.error(e);
        }
      } else {
        // スマホ: 従来方式
        const input = document.createElement('input');
        input.type = 'file'; input.multiple = true;
        input.accept = 'video/*,audio/*,.csv';
        input.webkitdirectory = true;
        input.onchange = async (e) => {
          const files = [...e.target.files];
          const folderMap = {};
          files.forEach(file => {
            const parts = file.webkitRelativePath.split('/');
            if (parts.length < 2) return;
            const topFolder = parts[1];
            const subPath   = parts.length >= 4 ? parts.slice(1,-1).join('/') : parts[1];
            const parentId  = parts.length >= 4 ? topFolder : null;
            const key = subPath + '|||' + (parentId || '');
            if (!folderMap[key]) folderMap[key] = { folderName: parts.slice(1,-1).pop() || parts[1], parentId, files: [] };
            folderMap[key].files.push(file);
          });
          // 最上位フォルダを先に登録してからサブフォルダを処理
          const entries = Object.values(folderMap);
          const topEntries = entries.filter(e => !e.parentId);
          const subEntries = entries.filter(e =>  e.parentId);
          for (const { folderName, parentId, files: folderFiles } of topEntries) {
            await processFolderFiles(folderName, folderFiles, parentId);
          }
          for (const { folderName, parentId, files: folderFiles } of subEntries) {
            await processFolderFiles(folderName, folderFiles, parentId);
          }
          // 全処理後にまとめてメタモーダル起動
          if (pendingFolders.length > 0 && currentMetaIndex === 0) {
            currentMetaIndex = 0; showMetaModal();
          }
        };
        input.click();
      }
    });

    // File System Access APIでフォルダを再帰的にスキャン
    async function scanDirHandle(dirHandle, folderName, parentFolderName) {
      const files = [], subDirs = [];
      for await (const entry of dirHandle.values()) {
        if (entry.kind === 'file') {
          const file = await entry.getFile();
          file._handle = entry; // ハンドルをファイルに紐付け
          files.push(file);
        } else if (entry.kind === 'directory') {
          subDirs.push({ handle: entry, name: entry.name });
        }
      }

      // このフォルダのハンドルをキャッシュ
      dirHandles[folderName] = dirHandle;

      if (files.length) {
        await processFolderFiles(folderName, files, parentFolderName);
      } else if (!parentFolderName && subDirs.length) {
        // ルート直下にファイルがなくサブフォルダのみの場合：
        // 先にlibraryエントリを作ってからサブを処理する
        const existingId = Object.keys(library).find(id => library[id].folderName === folderName);
        if (!existingId) {
          const workId = 'work_' + Date.now() + '_' + Math.random().toString(36).slice(2);
          library[workId] = { id:workId, folderName, title:folderName, circle:'', cv:'', rj:'', addedAt:Date.now(), plays:0, fav:false, tracks:[], children:{} };
          pendingFolders.push({ workId, folderName, folderMedia:{}, folderCsv:{}, csvMapping:{}, tracks:[] });
        }
      }

      // この時点でのfolderNameが最上位か確認して、サブフォルダの親を正しく渡す
      const isTopLevel = !parentFolderName;
      for (const sub of subDirs) {
        await scanDirHandle(sub.handle, sub.name, isTopLevel ? folderName : parentFolderName);
      }

      // ルートの処理が全部終わったらまとめてメタモーダル表示
      if (isTopLevel && pendingFolders.length > 0 && currentMetaIndex === 0) {
        showMetaModal();
      }
    }

    async function processFolderEntry(dirEntry, folderName, parentId=null) {
      return new Promise((resolve) => {
        dirEntry.createReader().readEntries(async (entries) => {
          const files = [];
          const subDirs = [];
          for (const entry of entries) {
            if (entry.isFile) files.push(await new Promise(r => entry.file(r)));
            else if (entry.isDirectory) subDirs.push(entry);
          }
          // このフォルダ直下にメディアがある場合は処理
          if (files.length) await processFolderFiles(folderName, files, parentId);
          // サブフォルダを処理（parentIdは最上位のworkId）
          for (const sub of subDirs) {
            await processFolderEntry(sub, sub.name, parentId || folderName);
          }
          resolve();
        });
      });
    }

    async function processFolderFiles(folderName, files, parentFolderName=null) {
      const folderMedia = {}, folderCsv = {};
      files.forEach(file => {
        const ext  = file.name.split('.').pop().toLowerCase();
        const base = file.name.replace(/\.[^.]+$/, '');
        if (['mp4','mp3','wav','ogg','m4a','webm'].includes(ext)) folderMedia[base] = file;
        else if (ext === 'csv') folderCsv[base] = file;
      });
      if (!Object.keys(folderMedia).length && !Object.keys(folderCsv).length) return;

      const mediaBases = Object.keys(folderMedia).sort();
      const csvBases   = Object.keys(folderCsv).sort();
      const csvMapping = {};
      if (csvBases.length === 1) {
        mediaBases.forEach(mb => { csvMapping[mb] = csvBases[0]; });
      } else if (csvBases.length === mediaBases.length) {
        mediaBases.forEach((mb, i) => { csvMapping[mb] = csvBases[i]; });
      } else {
        mediaBases.forEach(mb => { if (folderCsv[mb]) csvMapping[mb] = mb; });
      }

      mediaBases.forEach(mb => {
        mediaFiles[mb] = folderMedia[mb];
        const csvBase = csvMapping[mb];
        if (csvBase) {
          csvFiles[mb] = folderCsv[csvBase];
          // File System Access APIのハンドルをキャッシュ
          if (folderCsv[csvBase]?._handle) csvHandles[mb] = folderCsv[csvBase]._handle;
        }
      });

      const tracks = mediaBases.map(base => ({ base }));

      if (parentFolderName) {
        // サブフォルダ：親のworkIdを探して子として登録
        const parentId = Object.keys(library).find(id => library[id].folderName === parentFolderName);
        if (parentId) {
          if (!library[parentId].children) library[parentId].children = {};
          library[parentId].children[folderName] = tracks;
          saveLibraryToStorage();
          renderLibrarySidebar();
        }
        return;
      }

      // 最上位フォルダ
      const existingId = Object.keys(library).find(id => library[id].folderName === folderName);
      if (existingId) {
        // 既存フォルダの場合はトラック情報を更新
        library[existingId].tracks = tracks;
        saveLibraryToStorage();
        if (currentTrack && folderMedia[currentTrack]) loadTrack(currentTrack);
        renderLibrarySidebar();
      } else if (mediaBases.length) {
        const workId = 'work_' + Date.now() + '_' + Math.random().toString(36).slice(2);
        library[workId] = { id:workId, folderName, title:folderName, circle:'', cv:'', rj:'', addedAt:Date.now(), plays:0, fav:false, tracks, children:{} };
        pendingFolders.push({ workId, folderName, folderMedia, folderCsv, csvMapping, tracks });
        // File System Access API経由の場合はscanDirHandleがまとめてshowMetaModalを呼ぶ
        // ドラッグ&ドロップ・スマホ（input）の場合はここで起動
        if (!supportsFileSystemAccess) {
          if (pendingFolders.length === 1) { currentMetaIndex = 0; showMetaModal(); }
        }
      }
    }

    function showMetaModal() {
      // モーダルが既に開いている場合は重複起動しない
      if (!document.getElementById('meta-modal').classList.contains('hidden')) return;
      if (currentMetaIndex >= pendingFolders.length) { 
        pendingFolders = []; 
        currentMetaIndex = 0;
        renderLibrarySidebar(); 
        return; 
      }
      const { folderName } = pendingFolders[currentMetaIndex];
      document.getElementById('modal-title').textContent    = '作品情報を入力';
      document.getElementById('modal-folder').textContent   = 'フォルダ: ' + folderName;
      document.getElementById('modal-progress').textContent = pendingFolders.length > 1 ? (currentMetaIndex+1)+' / '+pendingFolders.length : '';
      document.getElementById('meta-work').value   = folderName;
      document.getElementById('meta-circle').value = '';
      document.getElementById('meta-cv').value     = '';
      document.getElementById('meta-rj').value     = '';
      editingWorkId = null;
      document.getElementById('meta-modal').classList.remove('hidden');
    }

    function saveMeta() {
      const isEdit = !!editingWorkId;
      const { workId, folderName } = isEdit
        ? { workId: editingWorkId, folderName: library[editingWorkId].folderName }
        : pendingFolders[currentMetaIndex];

      library[workId] = {
        ...library[workId],
        id: workId, folderName,
        title:   document.getElementById('meta-work').value   || folderName,
        circle:  document.getElementById('meta-circle').value || '',
        cv:      document.getElementById('meta-cv').value     || '',
        rj:      document.getElementById('meta-rj').value     || '',
        addedAt: library[workId]?.addedAt || Date.now(),
        plays:   library[workId]?.plays   || 0,
        fav:     library[workId]?.fav     || false,
        tracks:  library[workId]?.tracks  || [],
        children:library[workId]?.children || {},
      };

      saveLibraryToStorage();
      document.getElementById('meta-modal').classList.add('hidden');
      editingWorkId = null;

      if (isEdit) {
        renderLibrarySidebar();
        const w = library[workId];
        document.getElementById('work-title-display').textContent  = w.title;
        document.getElementById('work-rj-display').textContent     = w.rj;
        document.getElementById('work-circle-display').textContent = [w.circle, w.cv].filter(Boolean).join('／');
      } else {
        currentMetaIndex++;
        showMetaModal();
      }
    }

    function skipMeta() {
      const { workId } = pendingFolders[currentMetaIndex];
      library[workId].title = library[workId].folderName;
      saveLibraryToStorage();
      document.getElementById('meta-modal').classList.add('hidden');
      currentMetaIndex++;
      showMetaModal();
    }

    function openEditMeta() {
      if (!currentWorkId) return;
      const w = library[currentWorkId];
      editingWorkId = currentWorkId;
      document.getElementById('modal-title').textContent    = '作品情報を編集';
      document.getElementById('modal-folder').textContent   = 'フォルダ: ' + w.folderName;
      document.getElementById('modal-progress').textContent = '';
      document.getElementById('meta-work').value   = w.title;
      document.getElementById('meta-circle').value = w.circle;
      document.getElementById('meta-cv').value     = w.cv;
      document.getElementById('meta-rj').value     = w.rj;
      document.getElementById('meta-modal').classList.remove('hidden');
    }

    // ══════════════════════════════
    //  サイドバー描画（折りたたみ式）
    // ══════════════════════════════
    const expandedWorks = new Set(); // 展開中のworkId

    function renderLibrarySidebar() {
      const list  = document.getElementById('libraryList');
      const query = document.getElementById('searchInput').value.toLowerCase();
      const sort  = document.getElementById('sortSelect').value;
      let works   = Object.values(library);

      if (query) works = works.filter(w =>
        w.title.toLowerCase().includes(query)  ||
        w.circle.toLowerCase().includes(query) ||
        w.cv.toLowerCase().includes(query)     ||
        w.rj.toLowerCase().includes(query)
      );

      // 読み込み済みのファイルがある作品のみ表示（childrenのトラックも含めて判定）
      works = works.filter(w => {
        const topTracks = w.tracks || [];
        const childTracks = Object.values(w.children || {}).flat();
        const allTracks = [...topTracks, ...childTracks];
        // トラックが1件でもmediaFilesに登録されていれば表示
        // トラック自体が0件の場合もlibraryに明示的に追加された作品（childrenを持つ親）は表示
        return allTracks.some(t => mediaFiles[t.base]) || 
               (allTracks.length === 0 && Object.keys(w.children || {}).length > 0);
      });

      works.sort((a,b) => {
        if (sort==='added')  return a.addedAt - b.addedAt;
        if (sort==='title')  return a.title.localeCompare(b.title,'ja');
        if (sort==='circle') return a.circle.localeCompare(b.circle,'ja');
        if (sort==='plays')  return b.plays - a.plays;
        if (sort==='fav')    return (b.fav?1:0)-(a.fav?1:0);
        return 0;
      });

      list.innerHTML = '';
      if (!works.length) {
        list.innerHTML = '<div style="padding:16px 14px;font-size:11px;color:var(--text-dim);font-family:\'JetBrains Mono\',monospace;">作品がありません</div>';
        return;
      }

      works.forEach(w => {
        const isExpanded  = expandedWorks.has(w.id);
        const hasChildren = w.children && Object.keys(w.children).length > 0;
        const hasTracks   = w.tracks && w.tracks.length > 0;
        const hasContent  = hasChildren || hasTracks;

        // 作品行
        const div = document.createElement('div');
        div.className = 'work-item' + (w.id === currentWorkId ? ' active' : '');
        div.innerHTML = `
          <div class="work-item-header">
            <span style="font-size:10px;color:var(--text-dim);margin-right:4px;flex-shrink:0;">${hasContent?(isExpanded?'▾':'▸'):'　'}</span>
            <span class="work-title">${w.title}</span>
            <button class="fav-btn ${w.fav?'active':''}" data-id="${w.id}">★</button>
          </div>
          <div class="work-meta">${[w.circle,w.cv].filter(Boolean).join('／')||'情報なし'}</div>
          ${w.rj?`<div class="work-rj">${w.rj}</div>`:''}
          <div class="work-plays">再生 ${w.plays}回</div>`;

        div.addEventListener('click', (e) => {
          if (e.target.classList.contains('fav-btn')) return;
          selectWork(w.id);
          closeSidebar();
          if (hasContent) {
            if (isExpanded) expandedWorks.delete(w.id);
            else expandedWorks.add(w.id);
            renderLibrarySidebar();
          }
        });

        // 右クリックメニュー（作品行）
        div.addEventListener('contextmenu', (e) => {
          e.preventDefault();
          const items = [
            { label: '情報を編集', action: () => { currentWorkId=w.id; openEditMeta(); } },
          ];
          if (supportsFileSystemAccess) {
            items.push({ separator: true });
            items.push({ label: 'フォルダをリネーム', action: () => renameWorkFolder(w.id) });
            items.push({ label: 'フォルダを削除', action: () => deleteWorkFolder(w.id) });
            items.push({ label: 'サブフォルダを作成', action: () => createSubFolder(w.id) });
          }
          showContextMenu(e.clientX, e.clientY, items);
        });
        div.querySelector('.fav-btn').addEventListener('click', (e) => {
          e.stopPropagation();
          library[w.id].fav = !library[w.id].fav;
          saveLibraryToStorage(); renderLibrarySidebar();
        });
        list.appendChild(div);

        // 展開時：直下のトラックとサブフォルダを表示
        if (isExpanded) {
          // 直下のトラック
          if (hasTracks) {
            renderSubTracks(list, w.id, w.tracks, 1);
          }
          // サブフォルダ
          if (hasChildren) {
            renderSubFolders(list, w.id, w.children, 1);
          }
        }
      });
    }

    function renderSubTracks(list, workId, tracks, depth) {
      tracks.forEach(t => {
        const hasCSV = !!csvFiles[t.base];
        const row = document.createElement('div');
        row.style.cssText = `padding:6px 14px 6px ${14+depth*14}px; cursor:pointer; font-size:11px; font-family:'JetBrains Mono',monospace; color:var(--text-dim); display:flex; align-items:center; gap:6px; border-left:3px solid transparent; transition:all .15s;`;
        row.innerHTML = `
          <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">▷ ${t.base}</span>
          <span style="font-size:9px;padding:1px 5px;border-radius:3px;flex-shrink:0;${hasCSV?'background:rgba(79,255,176,.15);color:var(--success)':'background:rgba(255,183,77,.1);color:var(--warning)'}">${hasCSV?'CSV':'未割当'}</span>
          ${supportsFileSystemAccess?`<button class="file-op-btn" data-action="rename-file" data-base="${t.base}" title="リネーム">✎</button><button class="file-op-btn" data-action="delete-file" data-base="${t.base}" title="削除">✕</button>`:''}`;
        row.addEventListener('mouseenter', ()=>{ row.style.background='var(--bg3)'; });
        row.addEventListener('mouseleave', ()=>{ row.style.background=''; });
        row.addEventListener('click', (e) => {
          if (e.target.classList.contains('file-op-btn')) return;
          currentWorkId = workId;
          const allTracks = [...(library[workId].tracks||[])];
          if (library[workId].children) Object.values(library[workId].children).forEach(st=>allTracks.push(...st));
          trackList = allTracks.map(t=>t.base);
          loadTrack(t.base);
          closeSidebar();
        });
        // ファイル操作ボタン
        if (supportsFileSystemAccess) {
          row.querySelector('[data-action="rename-file"]')?.addEventListener('click', async (e) => {
            e.stopPropagation();
            await renameFile(t.base, workId);
          });
          row.querySelector('[data-action="delete-file"]')?.addEventListener('click', async (e) => {
            e.stopPropagation();
            await deleteFile(t.base, workId);
          });
        }
        list.appendChild(row);
      });
    }

    function renderSubFolders(list, parentWorkId, children, depth) {
      if (!window._expandedSubs) window._expandedSubs = new Set();
      const expandKey = parentWorkId + ':children';

      Object.entries(children).forEach(([subName, subTracks]) => {
        const key   = expandKey + ':' + subName;
        const isExp = window._expandedSubs.has(key);

        const row = document.createElement('div');
        row.style.cssText = `padding:7px 14px 7px ${14+depth*14}px; cursor:pointer; font-size:11px; font-family:'Syne',sans-serif; color:var(--text-dim); display:flex; align-items:center; gap:6px; transition:all .15s;`;
        row.innerHTML = `
          <span style="font-size:10px;">${isExp?'▾':'▸'}</span>
          <span style="font-weight:600;flex:1;">${subName}</span>
          <span style="font-size:9px;font-family:'JetBrains Mono',monospace;">${subTracks.length}曲</span>
          ${supportsFileSystemAccess?`<button class="file-op-btn" data-action="rename-dir" data-name="${subName}" data-parent="${parentWorkId}" title="リネーム">✎</button><button class="file-op-btn" data-action="delete-dir" data-name="${subName}" data-parent="${parentWorkId}" title="削除">✕</button>`:''}`;
        row.addEventListener('mouseenter', ()=>{ row.style.background='var(--bg3)'; });
        row.addEventListener('mouseleave', ()=>{ row.style.background=''; });
        row.addEventListener('click', (e) => {
          if (e.target.classList.contains('file-op-btn')) return;
          if (isExp) window._expandedSubs.delete(key);
          else window._expandedSubs.add(key);
          renderLibrarySidebar();
        });
        if (supportsFileSystemAccess) {
          row.querySelector('[data-action="rename-dir"]')?.addEventListener('click', async (e) => {
            e.stopPropagation();
            await renameDirInWork(parentWorkId, subName);
          });
          row.querySelector('[data-action="delete-dir"]')?.addEventListener('click', async (e) => {
            e.stopPropagation();
            await deleteDirInWork(parentWorkId, subName);
          });
        }
        list.appendChild(row);

        if (isExp) renderSubTracks(list, parentWorkId, subTracks, depth+1);
      });
    }

    // ══════════════════════════════
    //  作品・トラック選択
    // ══════════════════════════════
    let currentWorkId = null, currentTrack = null, trackList = [], currentTrackIndex = 0, isLoopAll = false;

    function selectWork(workId) {
      currentWorkId = workId;
      const w = library[workId];
      w.plays++; saveLibraryToStorage();

      document.getElementById('work-title-display').textContent  = w.title;
      document.getElementById('work-rj-display').textContent     = w.rj;
      document.getElementById('work-circle-display').textContent = [w.circle,w.cv].filter(Boolean).join('／');
      document.getElementById('editMetaBtn').style.display = 'inline-block';
      document.getElementById('editCsvBtn').style.display  = 'inline-block';

      const tracksEl = document.getElementById('tracksEl');
      tracksEl.innerHTML = '';

      const allTracks = [...(w.tracks||[])];
      if (w.children) Object.values(w.children).forEach(st => allTracks.push(...st));
      // 読み込み済みファイルのみ表示
      const loadedTracks = allTracks.filter(t => mediaFiles[t.base]);
      trackList = loadedTracks.map(t => t.base);

      loadedTracks.forEach((t,i) => {
        const hasCSV = !!csvFiles[t.base];
        const div = document.createElement('div');
        div.className = 'track' + (i===0?' active':'');
        div.innerHTML = `<span>${String(i+1).padStart(2,'0')}. ${t.base}</span><span class="csv-badge ${hasCSV?'':'missing'}">${hasCSV?'CSV':'未割当'}</span>`;
        div.addEventListener('click', () => loadTrack(t.base));
        // 右クリックメニュー
        div.addEventListener('contextmenu', (e) => {
          e.preventDefault();
          showContextMenu(e.clientX, e.clientY, [
            { label: 'CSVを編集', action: () => { currentTrack=t.base; openCsvSelect(); } },
          ]);
        });
        tracksEl.appendChild(div);
      });

      if (trackList.length) loadTrack(trackList[0]);
    }

    // ══════════════════════════════
    //  再生
    // ══════════════════════════════
    const player = document.getElementById('media-player');

    function loadTrack(base) {
      player.pause();
      document.getElementById('playBtn').textContent = '▶';
      sendCommand(0, 0);
      currentTrack      = base;
      currentTrackIndex = trackList.indexOf(base);
      const file = mediaFiles[base];
      if (!file) return;
      document.querySelectorAll('.track').forEach(t => {
        t.classList.toggle('active', t.querySelector('span').textContent.includes(base));
      });

      const isAudio = file.type.startsWith('audio/');

      if (isAudio) {
        // 音声ファイル：playerを非表示にしてサムネイル表示
        player.src = URL.createObjectURL(file);
        player.load();
        player.style.display = 'none';
        document.querySelector('.no-media').style.display = 'none';
        // サムネイル画像を探す
        showAudioThumbnail(base);
      } else {
        // 動画ファイル
        player.src = URL.createObjectURL(file);
        player.load();
        player.style.display = 'block';
        document.querySelector('.no-media').style.display = 'none';
        hideThumbnail();
      }

      if (csvFiles[base]) loadCSV(csvFiles[base]);
      else { schedule=[]; renderTimeline(); }
    }

    // サムネイル要素
    let thumbnailEl = null;
    function showAudioThumbnail(base) {
      hideThumbnail();
      // 同名の画像ファイルを探す（jpg/png/webp）
      const imgExts = ['jpg','jpeg','png','webp','gif'];
      let imgFile = null;
      for (const ext of imgExts) {
        if (mediaFiles[base + '_thumb'] || mediaFiles[base]) {
          // 同じフォルダの画像を探す
          const w = library[currentWorkId];
          if (w) {
            const folderHandle = dirHandles[w.folderName];
            if (folderHandle) {
              // 非同期で画像を検索
              searchThumbnailInFolder(folderHandle, base);
              return;
            }
          }
        }
        break;
      }
    }

    async function searchThumbnailInFolder(folderHandle, base) {
      const imgExts = ['jpg','jpeg','png','webp','gif'];
      try {
        for await (const entry of folderHandle.values()) {
          if (entry.kind === 'file') {
            const ext = entry.name.split('.').pop().toLowerCase();
            if (imgExts.includes(ext)) {
              const imgFile = await entry.getFile();
              displayThumbnail(imgFile);
              return;
            }
          }
        }
      } catch(e) {}
      // 画像が見つからない場合はデフォルト表示
      showDefaultAudioView();
    }

    function displayThumbnail(imgFile) {
      hideThumbnail();
      const videoWrap = document.getElementById('video-wrap');
      thumbnailEl = document.createElement('img');
      thumbnailEl.src = URL.createObjectURL(imgFile);
      thumbnailEl.style.cssText = 'max-width:100%;max-height:100%;object-fit:contain;';
      videoWrap.appendChild(thumbnailEl);
    }

    function showDefaultAudioView() {
      hideThumbnail();
      const videoWrap = document.getElementById('video-wrap');
      thumbnailEl = document.createElement('div');
      thumbnailEl.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:12px;color:var(--text-dim);';
      thumbnailEl.innerHTML = '<div style="font-size:64px;opacity:.4;">♪</div><div style="font-size:12px;font-family:\'JetBrains Mono\',monospace;">' + (currentTrack||'') + '</div>';
      videoWrap.appendChild(thumbnailEl);
    }

    function hideThumbnail() {
      if (thumbnailEl) { thumbnailEl.remove(); thumbnailEl = null; }
    }

    player.addEventListener('timeupdate', () => {
      const cur = player.currentTime, dur = player.duration||0;
      document.getElementById('timecur').textContent     = formatTime(cur);
      document.getElementById('timedur').textContent     = formatTime(dur);
      document.getElementById('seekbarFill').style.width = (dur?cur/dur*100:0)+'%';
      document.getElementById('tlPlayhead').style.left   = (dur?cur/dur*100:0)+'%';
      processBLESchedule(cur*10);
    });

    player.addEventListener('ended', () => {
      document.getElementById('playBtn').textContent = '▶';
      sendCommand(0,0);
      if (isLoopAll && trackList.length) {
        currentTrackIndex = (currentTrackIndex+1) % trackList.length;
        loadTrack(trackList[currentTrackIndex]);
        player.play();
        document.getElementById('playBtn').textContent = '⏸';
      }
    });

    player.addEventListener('pause',  () => sendCommand(0,0));
    player.addEventListener('play',   () => { lastSentIndex=-1; });
    player.addEventListener('seeked', () => { lastSentIndex=-1; });

    // seekbarスライド＋スマホ全画面スワイプ
    (function() {
      const sb = document.getElementById('seekbar');
      let seeking = false, rafId = null;

      function previewRatio(ratio) {
        const dur = player.duration || 0;
        document.getElementById('seekbarFill').style.width = (ratio*100)+'%';
        document.getElementById('tlPlayhead').style.left   = (ratio*100)+'%';
        document.getElementById('timecur').textContent     = formatTime(ratio*dur);
        if (!rafId) rafId = setTimeout(()=>{ player.currentTime=ratio*(player.duration||0); rafId=null; }, 150);
      }
      function commitRatio(ratio) {
        clearTimeout(rafId); rafId=null;
        player.currentTime = ratio*(player.duration||0);
        seeking=false; setSeekingState(false);
      }
      function ratioFromX(clientX) {
        const rect = sb.getBoundingClientRect();
        return Math.max(0, Math.min(1, (clientX-rect.left)/rect.width));
      }

      // PC：マウス操作
      sb.addEventListener('mousedown', (e)=>{ seeking=true; setSeekingState(true); showControlsTemporary(); previewRatio(ratioFromX(e.clientX)); });
      document.addEventListener('mousemove', (e)=>{ if(seeking) previewRatio(ratioFromX(e.clientX)); });
      document.addEventListener('mouseup',   (e)=>{ if(seeking) commitRatio(ratioFromX(e.clientX)); });

      // スマホ通常時のみseekbar直接タッチ
      sb.addEventListener('touchstart', (e)=>{
        if (document.body.classList.contains('fullscreen')) return;
        seeking=true; setSeekingState(true);
        previewRatio(ratioFromX(e.touches[0].clientX));
      }, {passive:true});
      sb.addEventListener('touchmove', (e)=>{
        if (document.body.classList.contains('fullscreen')) return;
        if (seeking){ e.preventDefault(); previewRatio(ratioFromX(e.touches[0].clientX)); }
      }, {passive:false});
      sb.addEventListener('touchend', (e)=>{
        if (document.body.classList.contains('fullscreen')) return;
        if (seeking) commitRatio(ratioFromX(e.changedTouches[0].clientX));
      });

      // スマホ全画面時：左右スワイプで再生位置を変える
      let swipeStartX = null, swipeStartTime = null;
      document.addEventListener('touchstart', (e)=>{
        if (!document.body.classList.contains('fullscreen') || window.innerWidth >= 769) return;
        swipeStartX    = e.touches[0].clientX;
        swipeStartTime = player.currentTime;
        setSeekingState(true);
        showControlsTemporary();
      }, {passive:true});
      document.addEventListener('touchmove', (e)=>{
        if (!document.body.classList.contains('fullscreen') || window.innerWidth >= 769) return;
        if (swipeStartX === null) return;
        const dur   = player.duration || 0;
        const delta = (e.touches[0].clientX - swipeStartX) / window.innerWidth * dur;
        const ratio = Math.max(0, Math.min(1, (swipeStartTime + delta) / dur));
        previewRatio(ratio);
      }, {passive:true});
      document.addEventListener('touchend', (e)=>{
        if (!document.body.classList.contains('fullscreen') || window.innerWidth >= 769) return;
        if (swipeStartX === null) return;
        const dur   = player.duration || 0;
        const delta = (e.changedTouches[0].clientX - swipeStartX) / window.innerWidth * dur;
        const ratio = Math.max(0, Math.min(1, (swipeStartTime + delta) / dur));
        commitRatio(ratio);
        swipeStartX = null; swipeStartTime = null;
      });
    })();

    document.getElementById('playBtn').addEventListener('click', () => {
      if (player.paused) { player.play(); document.getElementById('playBtn').textContent='⏸'; }
      else               { player.pause(); document.getElementById('playBtn').textContent='▶'; }
    });

    document.getElementById('btnPrev').addEventListener('click', () => {
      if (!trackList.length) return;
      currentTrackIndex = (currentTrackIndex-1+trackList.length) % trackList.length;
      loadTrack(trackList[currentTrackIndex]);
    });

    document.getElementById('btnNext').addEventListener('click', () => {
      if (!trackList.length) return;
      currentTrackIndex = (currentTrackIndex+1) % trackList.length;
      loadTrack(trackList[currentTrackIndex]);
    });

    document.getElementById('btnLoop').addEventListener('click', function() {
      isLoopAll = !isLoopAll;
      this.style.color = isLoopAll ? 'var(--accent)' : '';
    });

    function formatTime(sec) {
      const m=Math.floor(sec/60), s=Math.floor(sec%60);
      return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
    }

    // ══════════════════════════════
    //  CSV
    // ══════════════════════════════
    let schedule=[], lastSentIndex=-1;

    function loadCSV(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        const lines = e.target.result.trim().split('\n').slice(1);
        schedule = lines.map(line => {
          const [time_ms,direction,strength] = line.split(',').map(s=>s.trim());
          return { time_ms:parseInt(time_ms), direction:parseInt(direction), strength:parseInt(strength) };
        }).filter(r=>!isNaN(r.time_ms));
        // durationが既に取得済みならすぐ描画、まだならloadedmetadataを待つ
        if (player.readyState >= 1 && player.duration) {
          renderTimeline();
        } else {
          player.addEventListener('loadedmetadata', renderTimeline, {once:true});
        }
      };
      reader.readAsText(file);
    }

    function renderTimeline() {
      const track = document.getElementById('tlTrack');
      [...track.querySelectorAll('.tl-marker')].forEach(m=>m.remove());
      const dur=player.duration||0, h=track.clientHeight-6;
      schedule.forEach(row => {
        const pct = dur?(row.time_ms/10/dur*100):0;
        const m = document.createElement('div');
        m.className = 'tl-marker dir'+row.direction;
        m.style.left   = pct+'%';
        m.style.height = Math.max(3,Math.round(row.strength/100*h))+'px';
        m.title = '向き:'+row.direction+' 強さ:'+row.strength;
        m.addEventListener('click', () => { player.currentTime=row.time_ms/10; });
        track.appendChild(m);
      });
      const marks=document.querySelectorAll('.tl-time-mark'), count=marks.length-1;
      marks.forEach((mark,i) => { mark.textContent=formatTime(dur/count*i); });
    }

    function processBLESchedule(currentMs) {
      if (!schedule.length) return;
      for (let i=lastSentIndex+1; i<schedule.length; i++) {
        if (schedule[i].time_ms<=currentMs) { sendCommand(schedule[i].direction,schedule[i].strength); lastSentIndex=i; }
        else break;
      }
    }

    // タイムラインスライド（スムーズシーク）
    (function() {
      const tl = document.getElementById('tlTrack');
      let sliding = false, rafId = null;
      function preview(clientX) {
        const rect  = tl.getBoundingClientRect();
        const ratio = Math.max(0, Math.min(1, (clientX-rect.left)/rect.width));
        const dur   = player.duration || 0;
        document.getElementById('seekbarFill').style.width = (ratio*100)+'%';
        document.getElementById('tlPlayhead').style.left   = (ratio*100)+'%';
        document.getElementById('timecur').textContent     = formatTime(ratio*dur);
        if (!rafId) rafId = setTimeout(()=>{ player.currentTime=ratio*(player.duration||0); rafId=null; }, 150);
      }
      function commit(clientX) {
        clearTimeout(rafId); rafId=null;
        const rect  = tl.getBoundingClientRect();
        const ratio = Math.max(0, Math.min(1, (clientX-rect.left)/rect.width));
        player.currentTime = ratio*(player.duration||0);
        sliding=false; setSeekingState(false);
      }
      tl.addEventListener('mousedown',  (e)=>{ sliding=true; setSeekingState(true); showControlsTemporary(); preview(e.clientX); });
      document.addEventListener('mousemove',  (e)=>{ if(sliding) preview(e.clientX); });
      document.addEventListener('mouseup',    (e)=>{ if(sliding) commit(e.clientX); });
      tl.addEventListener('touchstart', (e)=>{ sliding=true; setSeekingState(true); preview(e.touches[0].clientX); }, {passive:true});
      tl.addEventListener('touchmove',  (e)=>{ if(sliding){ e.preventDefault(); preview(e.touches[0].clientX); } }, {passive:false});
      tl.addEventListener('touchend',   (e)=>{ if(sliding) commit(e.changedTouches[0].clientX); });
    })();

    // ══════════════════════════════
    //  右クリックメニュー
    // ══════════════════════════════
    const ctxMenu = document.getElementById('ctx-menu');
    document.addEventListener('click', () => ctxMenu.classList.remove('show'));
    document.addEventListener('contextmenu', () => ctxMenu.classList.remove('show'));

    function showContextMenu(x, y, items) {
      ctxMenu.innerHTML = '';
      items.forEach(item => {
        if (item.separator) {
          const sep = document.createElement('div');
          sep.className = 'ctx-separator';
          ctxMenu.appendChild(sep);
          return;
        }
        const el = document.createElement('div');
        el.className = 'ctx-item';
        el.textContent = item.label;
        el.addEventListener('click', (e) => { e.stopPropagation(); ctxMenu.classList.remove('show'); item.action(); });
        ctxMenu.appendChild(el);
      });

      // 画面外に出ないよう位置調整
      ctxMenu.style.left = x + 'px';
      ctxMenu.style.top  = y + 'px';
      ctxMenu.classList.add('show');
      const rect = ctxMenu.getBoundingClientRect();
      if (rect.right  > window.innerWidth)  ctxMenu.style.left = (x - rect.width)  + 'px';
      if (rect.bottom > window.innerHeight) ctxMenu.style.top  = (y - rect.height) + 'px';
    }

    // 作品フォルダのリネーム
    async function renameWorkFolder(workId) {
      const w = library[workId];
      const newName = prompt('新しいフォルダ名', w.folderName);
      if (!newName || newName === w.folderName) return;
      if (!rootDirHandle) { alert('フォルダが見つかりません。再読み込みしてください。'); return; }
      try {
        const oldHandle = dirHandles[w.folderName];
        const newDirHandle = await rootDirHandle.getDirectoryHandle(newName, { create: true });
        // ファイルをコピー
        if (oldHandle) {
          await copyDirContents(oldHandle, newDirHandle);
          await rootDirHandle.removeEntry(w.folderName, { recursive: true });
        }
        dirHandles[newName] = newDirHandle;
        delete dirHandles[w.folderName];
        // タイトルがフォルダ名と同じだった場合はタイトルも更新
        if (w.title === w.folderName) w.title = newName;
        w.folderName = newName;
        saveLibraryToStorage(); renderLibrarySidebar();
      } catch(e) { alert('リネームに失敗しました: ' + e.message); }
    }

    async function deleteWorkFolder(workId) {
      const w = library[workId];
      if (!confirm(`"${w.title}" を削除しますか？`)) return;
      if (!rootDirHandle) { alert('フォルダが見つかりません。'); return; }
      try {
        await rootDirHandle.removeEntry(w.folderName, { recursive: true }).catch(()=>{});
        delete library[workId];
        delete dirHandles[w.folderName];
        saveLibraryToStorage(); renderLibrarySidebar();
      } catch(e) { alert('削除に失敗しました: ' + e.message); }
    }

    async function createSubFolder(workId) {
      const w = library[workId];
      const name = prompt('新しいサブフォルダ名');
      if (!name) return;
      try {
        const parentHandle = dirHandles[w.folderName] || await rootDirHandle?.getDirectoryHandle(w.folderName);
        if (!parentHandle) { alert('フォルダが見つかりません。'); return; }
        const newHandle = await parentHandle.getDirectoryHandle(name, { create: true });
        dirHandles[name] = newHandle;
        if (!w.children) w.children = {};
        w.children[name] = [];
        saveLibraryToStorage(); renderLibrarySidebar();
      } catch(e) { alert('作成に失敗しました: ' + e.message); }
    }

    async function copyDirContents(srcHandle, dstHandle) {
      for await (const entry of srcHandle.values()) {
        if (entry.kind === 'file') {
          const file = await entry.getFile();
          const newHandle = await dstHandle.getFileHandle(entry.name, { create: true });
          const writable  = await newHandle.createWritable();
          await writable.write(await file.arrayBuffer());
          await writable.close();
        } else if (entry.kind === 'directory') {
          const subDst = await dstHandle.getDirectoryHandle(entry.name, { create: true });
          await copyDirContents(entry, subDst);
        }
      }
    }
    async function renameFile(base, workId) {
      const newName = prompt('新しいファイル名（拡張子なし）', base);
      if (!newName || newName === base) return;

      const mFile = mediaFiles[base];
      const ext   = mFile?.name.split('.').pop() || '';

      try {
        // 親フォルダのハンドルを取得
        const w          = library[workId];
        const parentName = w.folderName;
        const parentHandle = dirHandles[parentName];
        if (!parentHandle) { alert('フォルダが見つかりません。再読み込みしてください。'); return; }

        // 新ファイルを作成してコピー
        const newFileHandle = await parentHandle.getFileHandle(newName + '.' + ext, { create: true });
        const writable = await newFileHandle.createWritable();
        const buf = await mFile.arrayBuffer();
        await writable.write(buf);
        await writable.close();

        // 旧ファイルを削除
        await parentHandle.removeEntry(mFile.name);

        // メモリ上を更新
        const newFile = await newFileHandle.getFile();
        newFile._handle = newFileHandle;
        mediaFiles[newName] = newFile;
        delete mediaFiles[base];
        if (csvFiles[base])  { csvFiles[newName]  = csvFiles[base];  delete csvFiles[base]; }
        if (csvHandles[base]){ csvHandles[newName] = csvHandles[base]; delete csvHandles[base]; }

        // ライブラリ更新
        updateTrackBase(workId, base, newName);
        saveLibraryToStorage();
        renderLibrarySidebar();
      } catch(e) { alert('リネームに失敗しました: ' + e.message); }
    }

    async function deleteFile(base, workId) {
      if (!confirm(`"${base}" を削除しますか？`)) return;
      try {
        const mFile      = mediaFiles[base];
        const w          = library[workId];
        const parentHandle = dirHandles[w.folderName];
        if (!parentHandle) { alert('フォルダが見つかりません。'); return; }

        await parentHandle.removeEntry(mFile.name);
        if (csvFiles[base]) {
          await parentHandle.removeEntry(csvFiles[base].name).catch(()=>{});
        }

        delete mediaFiles[base]; delete csvFiles[base]; delete csvHandles[base];
        removeTrackFromWork(workId, base);
        saveLibraryToStorage();
        renderLibrarySidebar();
      } catch(e) { alert('削除に失敗しました: ' + e.message); }
    }

    async function renameDirInWork(workId, subName) {
      const newName = prompt('新しいフォルダ名', subName);
      if (!newName || newName === subName) return;
      // フォルダリネームはFile System Access APIでは直接できないため
      // 新フォルダを作成→ファイルをコピー→旧フォルダを削除
      try {
        const w = library[workId];
        const parentHandle = dirHandles[w.folderName];
        if (!parentHandle) { alert('フォルダが見つかりません。'); return; }

        const oldHandle = dirHandles[subName];
        const newDirHandle = await parentHandle.getDirectoryHandle(newName, { create: true });

        // ファイルをコピー
        if (oldHandle) {
          for await (const entry of oldHandle.values()) {
            if (entry.kind === 'file') {
              const file = await entry.getFile();
              const newHandle = await newDirHandle.getFileHandle(entry.name, { create: true });
              const writable  = await newHandle.createWritable();
              await writable.write(await file.arrayBuffer());
              await writable.close();
            }
          }
          await parentHandle.removeEntry(subName, { recursive: true });
        }

        // ライブラリ更新
        dirHandles[newName] = newDirHandle;
        delete dirHandles[subName];
        if (w.children[subName]) {
          w.children[newName] = w.children[subName];
          delete w.children[subName];
        }
        saveLibraryToStorage();
        renderLibrarySidebar();
      } catch(e) { alert('リネームに失敗しました: ' + e.message); }
    }

    async function deleteDirInWork(workId, subName) {
      if (!confirm(`"${subName}" フォルダを削除しますか？`)) return;
      try {
        const w = library[workId];
        const parentHandle = dirHandles[w.folderName];
        if (parentHandle) await parentHandle.removeEntry(subName, { recursive: true }).catch(()=>{});

        // メモリ上のトラックを削除
        if (w.children[subName]) {
          w.children[subName].forEach(t => {
            delete mediaFiles[t.base]; delete csvFiles[t.base]; delete csvHandles[t.base];
          });
          delete w.children[subName];
        }
        delete dirHandles[subName];
        saveLibraryToStorage();
        renderLibrarySidebar();
      } catch(e) { alert('削除に失敗しました: ' + e.message); }
    }

    function updateTrackBase(workId, oldBase, newBase) {
      const w = library[workId];
      const update = tracks => tracks.map(t => t.base === oldBase ? { base: newBase } : t);
      if (w.tracks) w.tracks = update(w.tracks);
      if (w.children) Object.keys(w.children).forEach(k => { w.children[k] = update(w.children[k]); });
    }

    function removeTrackFromWork(workId, base) {
      const w = library[workId];
      if (w.tracks) w.tracks = w.tracks.filter(t => t.base !== base);
      if (w.children) Object.keys(w.children).forEach(k => { w.children[k] = w.children[k].filter(t => t.base !== base); });
    }

    // ══════════════════════════════
    //  CSV編集遷移
    // ══════════════════════════════
    function openCsvSelect() {
      if (!currentWorkId || !currentTrack) return;
      const hasCsv = !!csvFiles[currentTrack];
      document.getElementById('csv-select-track').textContent  = '対象: ' + currentTrack;
      document.getElementById('csvBtnExisting').style.display  = hasCsv ? 'block' : 'none';
      document.getElementById('csvBtnCopy').style.display      = hasCsv ? 'block' : 'none';
      document.getElementById('csv-select-modal').classList.remove('hidden');
    }

    async function goToEditor(mode) {
      document.getElementById('csv-select-modal').classList.add('hidden');

      sessionStorage.setItem('editor-track',   currentTrack);
      sessionStorage.setItem('editor-mode',     mode);
      sessionStorage.setItem('editor-work-id',  currentWorkId);
      // File System Access API対応フラグ
      sessionStorage.setItem('editor-fsa', supportsFileSystemAccess ? '1' : '0');

      const mFile = mediaFiles[currentTrack];
      if (mFile) {
        sessionStorage.setItem('editor-media-name', mFile.name);
        sessionStorage.setItem('editor-media-type', mFile.type);
        await saveFileToIDB('editor-media', mFile);
      }

      const cFile = csvFiles[currentTrack];
      if (cFile && (mode==='existing'||mode==='copy')) {
        const text = await cFile.text();
        sessionStorage.setItem('editor-csv-text', text);
        sessionStorage.setItem('editor-csv-name', cFile.name);
      } else {
        sessionStorage.removeItem('editor-csv-text');
        sessionStorage.removeItem('editor-csv-name');
      }

      // CSVファイルハンドルをIDBに保存（直接上書き保存用）
      if (supportsFileSystemAccess && mode === 'existing' && csvHandles[currentTrack]) {
        await saveFileToIDB('editor-csv-handle', csvHandles[currentTrack]);
        sessionStorage.setItem('editor-has-handle', '1');
      } else {
        sessionStorage.removeItem('editor-has-handle');
        await saveFileToIDB('editor-csv-handle', null).catch(()=>{});
      }

      window.location.href = 'editor.html';
    }

    // IndexedDB経由でファイルを渡す
    function openIDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open('ble-player', 1);
        req.onupgradeneeded = (e) => e.target.result.createObjectStore('files');
        req.onsuccess  = (e) => resolve(e.target.result);
        req.onerror    = (e) => reject(e);
      });
    }

    async function saveFileToIDB(key, file) {
      const db = await openIDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction('files', 'readwrite');
        tx.objectStore('files').put(file, key);
        tx.oncomplete = resolve;
        tx.onerror    = reject;
      });
    }

    // ══════════════════════════════
    //  UI
    // ══════════════════════════════
    function openSidebar()  { document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebar-overlay').classList.add('open'); }
    function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').classList.remove('open'); }

    function toggleFullscreen() { document.body.classList.add('fullscreen'); showControlsTemporary(); }
    function leaveFullscreen()  { document.body.classList.remove('fullscreen','show-controls'); }

    let controlsTimer=null;
    let isSeeking = false; // シーク中フラグ

    function showControlsTemporary() {
      document.body.classList.add('show-controls');
      clearTimeout(controlsTimer);
      if (!isSeeking) {
        controlsTimer = setTimeout(()=>document.body.classList.remove('show-controls'),3000);
      }
    }

    function setSeekingState(val) {
      isSeeking = val;
      if (!val) showControlsTemporary(); // 操作終了後に再タイマー開始
    }

    document.getElementById('video-wrap').addEventListener('click', ()=>{
      if (document.body.classList.contains('fullscreen')) showControlsTemporary();
    });

    document.addEventListener('keydown', (e)=>{ if(e.key==='Escape') leaveFullscreen(); });

    // テキスト選択防止（ドラッグ中）
    document.addEventListener('selectstart', (e)=>{
      if (isSeeking) e.preventDefault();
    });

    function toggleMode() {
      const btn=document.getElementById('modeBtn');
      const modes=['CSV モード','ランダム','波形連動'];
      let idx=modes.indexOf(btn.textContent.trim());
      idx=(idx+1)%modes.length;
      btn.textContent=modes[idx];
      btn.classList.toggle('active',idx===0);
    }

    // ══════════════════════════════
    //  初期化
    // ══════════════════════════════
    // 編集画面から戻ってきた場合は接続画面をスキップ
    if (sessionStorage.getItem('editor-work-id')) {
      sessionStorage.removeItem('editor-work-id');
      document.getElementById('connect-screen').classList.add('hidden');
    }
    loadLibraryFromStorage();
    renderLibrarySidebar();
  </script>
</body>
